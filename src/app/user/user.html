<p>User works!</p>

@for (user of users; track user) {
    <h1>{{user}}</h1>
}
<hr>

@for(student of students; track student; let id = $index){
    <h1>{{id+1}}|{{student.name}} |<span>{{student.age}}</span>|<span>{{student.email}}</span></h1>
}


<ul>
    @for (stu of students; track stu.id) {
        <li><a routerLink="userd/{{stu.id}}/{{stu.name}}">{{stu.name}}</a></li>
    }
</ul>
